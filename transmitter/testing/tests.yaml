defaults:
  duration_seconds: 30
  test_duration_ms: 30000
  host_wait_time_ms: 5000
  repeats: 3
  cooldown_seconds: 5
  baud_rate: 921600
  project_path: ".."
  transports: [BROADCAST, MULTICAST]
  frequency_hz: [10, 100, 200, 750, 1000]
  frequency_tolerance: 0.05
  linger_ms: 100
  measure: true

profiles:
  full:
    topologies: full_matrix

  fast:
    repeats: 1
    duration_seconds: 15
    test_duration_ms: 15000
    transports: [BROADCAST]
    frequency_hz: [200, 750, 1000]
    topologies:
      - sensors: 4
        receivers: 1
      - sensors: 2
        receivers: 3

  broadcast_only:
    transports: [BROADCAST]
    duration_seconds: 15
    test_duration_ms: 15000
    frequency_hz: [10, 200, 750, 1000]



suites:
  baseline:
    can_ids_per_sensor: 1
    linger_ms: 100

  multiple:
    can_ids_per_sensor: 4
    linger_ms: 100

  real_time:
    can_ids_per_sensor: 1
    linger_ms: 0

  active_filter:
    can_ids_per_sensor: 1
    linger_ms: 100
    requires_min_sensors: 2
    receiver_filter: exclude_some_sensor_ids

  mixed_frequency:
    can_ids_per_sensor: 1
    linger_ms: 100
    requires_min_sensors: 2
    frequency_assignment: unique_per_sensor
    frequency_hz: [100, 200, 750, 1000]

suite_groups:
  all:
    - baseline
    - multiple
    - real_time
    - active_filter
    - mixed_frequency
